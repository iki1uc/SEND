<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SEND · Transferstation</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { color:#0f0; text-align:center; }

#geo {
    width:360px;
    height:360px;
    margin:auto;
    border-radius:50%;
    border:3px solid #0f0;
    position:relative;
}

.dot {
    width:12px;
    height:12px;
    background:#0f0;
    border-radius:50%;
    position:absolute;
}

pre {
    background:#111;
    padding:20px;
    border-left:3px solid #0f0;
}
</style>

<script src="SEND.core.js"></script>
<script src="SEND.state.js"></script>
<script src="SEND.push.js"></script>
<script src="SEND.pipe.js"></script>

</head>

<body>

<h1>SEND · Transferstation</h1>

<div id="geo"></div>
<pre id="status">Lade SEND…</pre>

<script>
const geo = document.getElementById("geo");
const count = 36;
const radius = 160;

for(let i=0; i<count; i++){
    const dot = document.createElement("div");
    dot.className = "dot";

    const angle = (i / count) * Math.PI * 2;
    const x = Math.cos(angle)*radius + 180 - 6;
    const y = Math.sin(angle)*radius + 180 - 6;

    dot.style.left = x+"px";
    dot.style.top  = y+"px";

    geo.appendChild(dot);
}

SEND.enter(99);

const state = SEND_STATE.detect(SEND.input);
SEND.state = state;

const pushed = SEND.push();
const result = SEND.compute();
const forward = SEND_PIPE.forward(result);

document.getElementById("status").innerText =
    JSON.stringify({ SEND: result, forward }, null, 2);
</script>

</body>
</html>
